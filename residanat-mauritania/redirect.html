<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objectif Résidanat - Redirection</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        .redirect-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        p {
            margin: 0;
            opacity: 0.8;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="spinner"></div>
        <h1>Objectif Résidanat</h1>
        <p>Redirection vers les instructions...</p>
    </div>
    
    <script>
        // Check if user has seen instructions
        const hasSeenInstructions = localStorage.getItem('hasSeenInstructions') === 'true';
        
        if (hasSeenInstructions) {
            // Check if user is logged in or is a guest
            const isGuest = sessionStorage.getItem('isGuest') === 'true';
            
            if (isGuest) {
                window.location.href = 'index.html';
            } else {
                // Check if user is logged in via Supabase
                // This will be handled by the main app
                window.location.href = 'index.html';
            }
        } else {
            // Redirect to instructions
            window.location.href = 'instructions.html';
        }
    </script>
</body>
</html>
